<!DOCTYPE html>
<html>
<head>
  <title>The page you were looking for doesn't exist (404)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
  body {
    background: url('404-bg.jpg') no-repeat top center;
    text-align: center;
    font-family: arial, sans-serif;
  }
  .error-page {
    margin-top: 180px;
  }
  .error-page img {
    margin-bottom: 50px;
  }
  .error-page h3 {
    text-transform: uppercase;
    color: #fff;
    background-color: #a0a0a0;
    line-height: 50px;
    margin: 0 auto;
    display: table;
    font-size: 21px;
    padding: 0 70px;
  }
  .error-page p {
    color: #fff;
  }
  .error-page a {
    text-decoration: none;
    text-transform: uppercase;
    color: #3c648f;
    background-color: #C7C7C7;
    line-height: 40px;
    display: inline-block;
    padding: 0 10px;
    font-size: 15px;
    font-weight: bold;
    margin-top: 20px; 
  }
  


  </style>
</head>

<body>
  <!-- This file lives in public/404.html -->
  <div class="error-page">
    <img src="/404.png">
    <h3>oops! sorry we can't find that page</h3>
    <p>Either something went wrong or the page does not exist anymore</p>
    <a href="/">return to homepage</a>
  </div>
</body>
</html>
